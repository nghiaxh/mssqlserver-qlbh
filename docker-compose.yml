services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qlbh-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./init:/init
    networks:
      - qlbh-network

volumes:
  sqlserver-data:

networks:
  qlbh-network:
    driver: bridge
